name: Deploy to Production

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment:
      name: prod
      url: https://selektiert.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via rsync
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 46.225.179.9 >> ~/.ssh/known_hosts
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='CLAUDE.md' \
            --exclude='certs/' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='admin/uploads/' \
            --exclude='admin/setup.php' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ root@46.225.179.9:/var/www/selektiert.com/
